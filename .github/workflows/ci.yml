name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate action definition
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml syntax
        run: |
          python3 -c "
          import yaml, sys
          with open('action.yml') as f:
            data = yaml.safe_load(f)
          required = ['name', 'description', 'runs']
          missing = [k for k in required if k not in data]
          if missing:
            print(f'Missing required fields: {missing}')
            sys.exit(1)
          if data['runs'].get('using') != 'composite':
            print('Expected runs.using = composite')
            sys.exit(1)
          print('action.yml is valid')
          "

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Start a simple HTTP server
        run: |
          mkdir -p /tmp/www
          echo '<html><body><h1>GreenIT Test Page</h1></body></html>' > /tmp/www/index.html
          python3 -m http.server 8080 --directory /tmp/www &
          sleep 2
          curl -sf http://localhost:8080 | grep -q 'GreenIT Test Page'
          echo "HTTP server is ready"

      - name: Run GreenIT Analysis
        id: greenit
        uses: ./
        with:
          url-file: 'tests/greenit-urls.yaml'
          min-ecoindex: '1'
          fail-on-threshold: 'true'
          report-name: 'greenit-report-ci'

      - name: Check output
        run: |
          echo "EcoIndex: ${{ steps.greenit.outputs.ecoindex }}"
          if [ -z "${{ steps.greenit.outputs.ecoindex }}" ]; then
            echo "❌ Output 'ecoindex' is empty"
            exit 1
          fi
          echo "✅ Output 'ecoindex' is set"
